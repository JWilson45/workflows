name: Build & Deploy Images

on:
  workflow_call:
    inputs:
      images_json:
        required: true
        type: string
      platforms:
        required: false
        default: linux/amd64
        type: string
      kube_namespace:
        required: true
        type: string
      planning_runner_label:
        required: false
        default: mm-runner-set-no-dind
        type: string
      build_runner_label:
        required: false
        default: mm-runner-set
        type: string
      helm_release:
        required: true
        type: string
      helm_chart:
        required: true
        type: string
      helm_values_file:
        required: true
        type: string
      helm_timeout:
        required: false
        default: 3m
        type: string
      do_deploy:
        required: false
        default: true
        type: boolean
      gitops_repository:
        required: false
        default: ""
        type: string
      gitops_application_file:
        required: false
        default: ""
        type: string
      gitops_branch:
        required: false
        default: main
        type: string
      gitops_update_target_revision:
        required: false
        default: false
        type: boolean
      gitops_target_revision:
        required: false
        default: ""
        type: string
      gitops_webhook_url:
        required: false
        default: ""
        type: string
    secrets:
      kubeconfig_b64:
        required: false
      dockerhub_username:
        required: false
      dockerhub_token:
        required: false
      gitops_token:
        required: false
      gitops_webhook_secret:
        required: false

jobs:
  plan:
    runs-on: ${{ inputs.planning_runner_label }}
    timeout-minutes: 10
    concurrency:
      group: ${{ github.workflow }}-${{ inputs.helm_release }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: read
    outputs:
      build_matrix: ${{ steps.plan.outputs.build_matrix }}
      helm_set_args: ${{ steps.plan.outputs.helm_set_args }}
      should_build: ${{ steps.plan.outputs.should_build }}
      should_deploy: ${{ steps.plan.outputs.should_deploy }}
    env:
      IMAGES_JSON: ${{ inputs.images_json }}
      IS_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
      IS_RERUN: ${{ github.run_attempt > 1 }}
    steps:
      - name: Plan image builds
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          images_file="$(mktemp)"
          printf '%s' "$IMAGES_JSON" > "$images_file"
          jq -e 'type == "array" and length > 0' "$images_file" >/dev/null

          pr_number="${{ github.event.pull_request.number }}"
          source_ref="${{ github.sha }}"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.action }}" = "closed" ] && [ -n "${{ github.event.pull_request.merge_commit_sha }}" ]; then
            source_ref="${{ github.event.pull_request.merge_commit_sha }}"
          fi
          cache_pr_number="$pr_number"
          is_open_pr_context=false
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.action }}" != "closed" ]; then
            is_open_pr_context=true
          fi
          is_merged_pr_close=false
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.action }}" = "closed" ] && [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            is_merged_pr_close=true
          fi
          if [ -z "$cache_pr_number" ] && [ "${{ github.event_name }}" = "push" ]; then
            associated_prs_json="$(curl -fsSL \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github.groot-preview+json" \
              "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" || true)"
            if [ -n "$associated_prs_json" ]; then
              cache_pr_number="$(jq -r 'if type == "array" then [.[] | select(.merged_at != null)] | sort_by(.number) | last | .number // empty else empty end' <<< "$associated_prs_json")"
            fi
          fi
          short_sha="$(echo "$GITHUB_SHA" | cut -c1-7)"
          build_matrix='[]'
          helm_set_args=''

          check_tag() {
            local image="$1"
            local tag="$2"
            local registry repo token status
            registry="$(echo "$image" | cut -d'/' -f1)"
            repo="$(echo "$image" | cut -d'/' -f2-)"
            if [ -z "$registry" ] || [ -z "$repo" ] || [ "$registry" = "$image" ]; then
              echo "image must be a full image reference like ghcr.io/org/repo. Got: $image" >&2
              exit 1
            fi
            token="$(curl -s "https://$registry/token?scope=repository:$repo:pull" | jq -r .token)"
            status="$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $token" \
              -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json" \
              "https://$registry/v2/$repo/manifests/$tag")"
            [ "$status" = "200" ]
          }

          append_cache_from() {
            local current="$1"
            local ref="$2"
            if [ -z "$current" ]; then
              printf 'type=registry,ref=%s' "$ref"
            else
              printf '%s\n%s' "$current" "type=registry,ref=$ref"
            fi
          }

          while IFS= read -r image_config; do
            name="$(jq -r '.name // empty' <<< "$image_config")"
            image="$(jq -r '.image // empty' <<< "$image_config")"
            app_dir="$(jq -r '.appDir // empty' <<< "$image_config")"
            docker_target="$(jq -r '.dockerTarget // empty' <<< "$image_config")"
            docker_context="$(jq -r '.context // "."' <<< "$image_config")"
            dockerfile="$(jq -r '.dockerfile // "Dockerfile"' <<< "$image_config")"
            helm_tag_path="$(jq -r '.helmTagPath // empty' <<< "$image_config")"

            if [ -z "$name" ] || [ -z "$image" ] || [ -z "$app_dir" ] || [ -z "$docker_target" ] || [ -z "$helm_tag_path" ]; then
              echo "Each image entry requires name, image, appDir, dockerTarget, and helmTagPath." >&2
              echo "$image_config" >&2
              exit 1
            fi

            registry="$(echo "$image" | cut -d'/' -f1)"
            package_json="$(curl -fsSL \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github.raw" \
              "https://api.github.com/repos/${{ github.repository }}/contents/$app_dir/package.json?ref=$source_ref")"
            version="$(jq -r '.version' <<< "$package_json")"

            if [ "$is_open_pr_context" = "true" ]; then
              image_tag="${version}-pr${pr_number}-${short_sha}"
            else
              image_tag="$version"
            fi

            tags="$image:$image_tag"
            if [ "$is_open_pr_context" != "true" ]; then
              tags="${tags}"$'\n'"$image:latest"
            fi
            cache_tag="$(printf '%s' "$docker_target" | tr -c 'A-Za-z0-9_.-' '-')"
            cache_ref="$image:buildcache-$cache_tag"
            cache_from=""
            cache_to="type=registry,ref=$cache_ref,mode=max"
            if [ -n "$cache_pr_number" ]; then
              pr_cache_ref="$image:buildcache-$cache_tag-pr$cache_pr_number"
              if check_tag "$image" "buildcache-$cache_tag-pr$cache_pr_number"; then
                cache_from="$(append_cache_from "$cache_from" "$pr_cache_ref")"
              fi
              if [ "$is_open_pr_context" = "true" ]; then
                cache_to="type=registry,ref=$pr_cache_ref,mode=max"
              fi
            fi
            if check_tag "$image" "buildcache-$cache_tag"; then
              cache_from="$(append_cache_from "$cache_from" "$cache_ref")"
            fi

            if ! check_tag "$image" "$image_tag"; then
              matrix_item="$(jq -cn \
                --arg name "$name" \
                --arg image "$image" \
                --arg registry "$registry" \
                --arg dockerTarget "$docker_target" \
                --arg dockerContext "$docker_context" \
                --arg dockerfile "$dockerfile" \
                --arg tags "$tags" \
                --arg cacheFrom "$cache_from" \
                --arg cacheTo "$cache_to" \
                '{name:$name,image:$image,registry:$registry,dockerTarget:$dockerTarget,dockerContext:$dockerContext,dockerfile:$dockerfile,tags:$tags,cacheFrom:$cacheFrom,cacheTo:$cacheTo}')"
              build_matrix="$(jq -c --argjson item "$matrix_item" '. + [$item]' <<< "$build_matrix")"
            fi

            if [ -n "$helm_set_args" ]; then
              helm_set_args="${helm_set_args},"
            fi
            helm_set_args="${helm_set_args}${helm_tag_path}=${image_tag}"
          done < <(jq -c '.[]' "$images_file")

          should_build=false
          if [ "$(jq 'length' <<< "$build_matrix")" -gt 0 ]; then
            should_build=true
          fi

          operator_override=false
          if [ "$IS_MANUAL" = "true" ] || [ "$IS_RERUN" = "true" ]; then
            operator_override=true
          fi

          should_deploy=false
          if [ "${{ inputs.do_deploy }}" = "true" ] && { [ "$should_build" = "true" ] || [ "$operator_override" = "true" ] || [ "$is_merged_pr_close" = "true" ]; }; then
            should_deploy=true
          fi

          echo "build_matrix=$build_matrix" >> "$GITHUB_OUTPUT"
          echo "helm_set_args=$helm_set_args" >> "$GITHUB_OUTPUT"
          echo "should_build=$should_build" >> "$GITHUB_OUTPUT"
          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.image.name }}
    needs: plan
    if: needs.plan.outputs.should_build == 'true'
    runs-on: ${{ inputs.build_runner_label }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.build_matrix) }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merge_commit_sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ matrix.image.registry }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Check Docker Hub credentials
        id: dockerhub
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.dockerhub_username }}
          DOCKERHUB_TOKEN: ${{ secrets.dockerhub_token }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.dockerContext }}
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.dockerTarget }}
          platforms: ${{ inputs.platforms }}
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ matrix.image.tags }}
          cache-from: ${{ matrix.image.cacheFrom }}
          cache-to: ${{ matrix.image.cacheTo }}

  deploy:
    needs:
      - plan
      - build
    if: >-
      always() &&
      needs.plan.outputs.should_deploy == 'true' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ${{ inputs.planning_runner_label }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Plan Helm deploy mode
        id: helm_deploy
        shell: bash
        env:
          GITOPS_REPOSITORY: ${{ inputs.gitops_repository }}
          KUBECONFIG_B64: ${{ secrets.kubeconfig_b64 }}
        run: |
          set -euo pipefail
          enabled=false
          if [ -z "$GITOPS_REPOSITORY" ] || [ -n "$KUBECONFIG_B64" ]; then
            enabled=true
          fi
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - name: Checkout repo
        if: steps.helm_deploy.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Helm
        if: steps.helm_deploy.outputs.enabled == 'true'
        uses: azure/setup-helm@v4

      - name: Load kubeconfig
        if: steps.helm_deploy.outputs.enabled == 'true'
        shell: bash
        env:
          KUBECONFIG_B64: ${{ secrets.kubeconfig_b64 }}
        run: |
          set -euo pipefail
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "kubeconfig_b64 is required when Helm deployment is enabled." >&2
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Helm upgrade/install
        if: steps.helm_deploy.outputs.enabled == 'true'
        shell: bash
        run: |
          helm upgrade --install \
            "${{ inputs.helm_release }}" \
            "${{ inputs.helm_chart }}" \
            -f "${{ inputs.helm_values_file }}" \
            -n "${{ inputs.kube_namespace }}" \
            --set-string "${{ needs.plan.outputs.helm_set_args }}" \
            --rollback-on-failure \
            --wait \
            --timeout "${{ inputs.helm_timeout }}" \
            --history-max 5

      - name: Checkout GitOps repo
        if: inputs.gitops_repository != ''
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.gitops_repository }}
          ref: ${{ inputs.gitops_branch }}
          token: ${{ secrets.gitops_token }}
          path: gitops
          fetch-depth: 1

      - name: Update GitOps application
        if: inputs.gitops_repository != ''
        shell: bash
        env:
          APPLICATION_FILE: ${{ inputs.gitops_application_file }}
          HELM_SET_ARGS: ${{ needs.plan.outputs.helm_set_args }}
          GITOPS_UPDATE_TARGET_REVISION: ${{ inputs.gitops_update_target_revision }}
          GITOPS_TARGET_REVISION: ${{ inputs.gitops_target_revision || github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "$APPLICATION_FILE" ]; then
            echo "gitops_application_file is required when gitops_repository is set." >&2
            exit 1
          fi
          if [ -z "$HELM_SET_ARGS" ]; then
            echo "No Helm image tag parameters were planned." >&2
            exit 1
          fi
          python3 - <<'PY'
          from pathlib import Path
          import json
          import os

          path = Path("gitops") / os.environ["APPLICATION_FILE"]
          if not path.exists():
              raise SystemExit(f"{path} does not exist")

          updates = {}
          for item in os.environ["HELM_SET_ARGS"].split(","):
              if "=" not in item:
                  raise SystemExit(f"Invalid Helm set argument: {item}")
              name, value = item.split("=", 1)
              updates[name] = value

          lines = path.read_text().splitlines()
          current = None
          seen = set()
          for i, line in enumerate(lines):
              stripped = line.strip()
              if stripped.startswith("- name: "):
                  name = stripped.removeprefix("- name: ").strip().strip('"').strip("'")
                  current = name if name in updates else None
              elif stripped.startswith("name: "):
                  name = stripped.removeprefix("name: ").strip().strip('"').strip("'")
                  current = name if name in updates else None
              elif current and stripped.startswith("value:"):
                  indent = line[:len(line) - len(line.lstrip())]
                  lines[i] = f"{indent}value: {updates[current]}"
                  seen.add(current)
                  current = None

          missing = sorted(set(updates) - seen)
          if missing:
              raise SystemExit(f"Missing Helm parameter(s) in {path}: {', '.join(missing)}")

          update_target_revision = os.environ.get("GITOPS_UPDATE_TARGET_REVISION") == "true"
          target_revision = os.environ.get("GITOPS_TARGET_REVISION", "").strip()
          if update_target_revision:
              if not target_revision:
                  raise SystemExit("gitops_update_target_revision is true but no target revision was resolved")
              for i, line in enumerate(lines):
                  stripped = line.strip()
                  if stripped.startswith("targetRevision:"):
                      indent = line[:len(line) - len(line.lstrip())]
                      lines[i] = f"{indent}targetRevision: {json.dumps(target_revision)}"
                      break
              else:
                  raise SystemExit(f"Missing targetRevision in {path}")

          path.write_text("\n".join(lines) + "\n")
          PY

      - name: Push GitOps update
        id: push_gitops_update
        if: inputs.gitops_repository != ''
        working-directory: gitops
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No GitOps changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.gitops_application_file }}"
          git commit -m "Update ${{ inputs.helm_release }} GitOps deployment"
          for attempt in 1 2 3 4 5; do
            git fetch origin "${{ inputs.gitops_branch }}"
            git rebase "origin/${{ inputs.gitops_branch }}"
            if git push origin HEAD:${{ inputs.gitops_branch }}; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "GitOps push attempt $attempt failed; retrying after rebase." >&2
            sleep $((attempt * 2))
          done
          echo "Failed to push GitOps update after retrying." >&2
          exit 1

      - name: Trigger Argo CD webhook
        if: inputs.gitops_repository != '' && steps.push_gitops_update.outputs.changed == 'true'
        working-directory: gitops
        shell: bash
        env:
          GITOPS_WEBHOOK_URL: ${{ inputs.gitops_webhook_url }}
          GITOPS_WEBHOOK_SECRET: ${{ secrets.gitops_webhook_secret }}
          GITOPS_BRANCH: ${{ inputs.gitops_branch }}
        run: |
          set -euo pipefail
          if [ -z "$GITOPS_WEBHOOK_URL" ]; then
            echo "gitops_webhook_url is not set; skipping Argo CD webhook trigger."
            exit 0
          fi

          webhook_url="${GITOPS_WEBHOOK_URL%/}/api/webhook"
          payload_file="$(mktemp)"
          signature_file="$(mktemp)"
          commit_sha="$(git rev-parse HEAD)"
          repo_url="https://github.com/${{ inputs.gitops_repository }}.git"

          jq -cn \
            --arg ref "refs/heads/$GITOPS_BRANCH" \
            --arg before "" \
            --arg after "$commit_sha" \
            --arg clone_url "$repo_url" \
            --arg html_url "https://github.com/${{ inputs.gitops_repository }}" \
            '{ref:$ref,before:$before,after:$after,repository:{clone_url:$clone_url,html_url:$html_url,url:$html_url}}' \
            > "$payload_file"

          headers=(
            -H "Content-Type: application/json"
            -H "X-GitHub-Event: push"
            -H "X-GitHub-Delivery: $GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          )

          if [ -n "$GITOPS_WEBHOOK_SECRET" ]; then
            python3 - "$GITOPS_WEBHOOK_SECRET" "$payload_file" "$signature_file" <<'PY'
          import hmac
          import hashlib
          import sys
          from pathlib import Path

          secret = sys.argv[1].encode()
          payload = Path(sys.argv[2]).read_bytes()
          signature = hmac.new(secret, payload, hashlib.sha256).hexdigest()
          Path(sys.argv[3]).write_text(f"sha256={signature}")
          PY
            headers+=(-H "X-Hub-Signature-256: $(cat "$signature_file")")
          fi

          curl -fsSL -X POST "${headers[@]}" --data-binary "@$payload_file" "$webhook_url"
