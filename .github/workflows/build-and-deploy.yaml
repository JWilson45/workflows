name: Build & Deploy Images

on:
  workflow_call:
    inputs:
      images_json:
        description: JSON array of images to plan/build (name, image, appDir, dockerTarget, helmTagPath, optional context/dockerfile)
        required: true
        type: string
      products_json:
        description: JSON array of products to deploy atomically (optional). See README.
        required: false
        default: ""
        type: string
      # all = bake then ship (legacy single call). build = bake only. deploy = ship only.
      # Using phase=build + phase=deploy from the caller yields a short Actions graph
      # (no skipped plan/build/deploy triplets).
      phase:
        description: "all | build | deploy"
        required: false
        default: all
        type: string
      platforms:
        required: false
        default: linux/amd64
        type: string
      kube_namespace:
        required: false
        default: ""
        type: string
      planning_runner_label:
        required: false
        default: mm-runner-set-no-dind
        type: string
      build_runner_label:
        required: false
        default: mm-runner-set
        type: string
      helm_release:
        required: false
        default: ""
        type: string
      helm_chart:
        required: false
        default: ""
        type: string
      helm_values_file:
        required: false
        default: ""
        type: string
      helm_timeout:
        required: false
        default: 3m
        type: string
      do_deploy:
        required: false
        default: true
        type: boolean
      gitops_repository:
        required: false
        default: ""
        type: string
      gitops_application_file:
        required: false
        default: ""
        type: string
      gitops_branch:
        required: false
        default: main
        type: string
      gitops_update_target_revision:
        required: false
        default: false
        type: boolean
      gitops_target_revision:
        required: false
        default: ""
        type: string
      gitops_webhook_url:
        required: false
        default: ""
        type: string
    secrets:
      kubeconfig_b64:
        required: false
      dockerhub_username:
        required: false
      dockerhub_token:
        required: false
      gitops_token:
        required: false
      gitops_webhook_secret:
        required: false

jobs:
  # Single job for image planning + bake (no separate plan / skipped deploy nodes).
  bake:
    name: Bake
    if: ${{ inputs.phase == 'build' || inputs.phase == 'all' }}
    runs-on: ${{ inputs.build_runner_label }}
    timeout-minutes: 60
    concurrency:
      group: ${{ github.workflow }}-${{ inputs.helm_release != '' && inputs.helm_release || 'multi' }}-bake-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merge_commit_sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Plan image builds
        id: plan
        uses: JWilson45/workflows/.github/actions/plan-images@v3.5.0
        with:
          images_json: ${{ inputs.images_json }}
          products_json: ${{ inputs.products_json }}
          do_deploy: ${{ inputs.do_deploy }}
          helm_release: ${{ inputs.helm_release }}
          kube_namespace: ${{ inputs.kube_namespace }}
          helm_chart: ${{ inputs.helm_chart }}
          helm_values_file: ${{ inputs.helm_values_file }}

      - name: Set up Docker Buildx
        if: steps.plan.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to image registries
        if: steps.plan.outputs.should_build == 'true'
        shell: bash
        env:
          BUILD_MATRIX: ${{ steps.plan.outputs.build_matrix }}
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          while IFS= read -r registry; do
            [ -z "$registry" ] && continue
            echo "Logging in to $registry"
            echo "$REGISTRY_TOKEN" | docker login "$registry" -u "$REGISTRY_USER" --password-stdin
          done < <(jq -r '.[].registry' <<< "$BUILD_MATRIX" | sort -u)

      - name: Check Docker Hub credentials
        id: dockerhub
        if: steps.plan.outputs.should_build == 'true'
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.dockerhub_username }}
          DOCKERHUB_TOKEN: ${{ secrets.dockerhub_token }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.plan.outputs.should_build == 'true' && steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}

      - name: Generate bake file and build all images
        if: steps.plan.outputs.should_build == 'true'
        shell: bash
        env:
          BUILD_MATRIX: ${{ steps.plan.outputs.build_matrix }}
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          set -euo pipefail

          image_count="$(jq 'length' <<< "$BUILD_MATRIX")"
          if [ "$image_count" -eq 0 ]; then
            echo "No images to build."
            exit 0
          fi

          platforms_json="$(printf '%s' "$PLATFORMS" | tr ',' '\n' | sed '/^$/d' | jq -R . | jq -s -c .)"
          bake_file="$(mktemp)"

          jq -n \
            --argjson images "$BUILD_MATRIX" \
            --argjson platforms "$platforms_json" \
            '
            def lines:
              if . == null or . == "" then []
              else (split("\n") | map(select(length > 0)))
              end;

            {
              group: {
                default: {
                  targets: [ $images[].name ]
                }
              },
              target: (
                [ $images[] | {
                    key: .name,
                    value: (
                      {
                        context: .dockerContext,
                        dockerfile: .dockerfile,
                        target: .dockerTarget,
                        tags: (.tags | lines),
                        platforms: $platforms,
                        output: ["type=image,push=true"],
                        attest: [
                          "type=provenance,mode=max",
                          "type=sbom"
                        ]
                      }
                      + (if (.cacheFrom | lines | length) > 0
                         then { "cache-from": (.cacheFrom | lines) }
                         else {} end)
                      + (if (.cacheTo | lines | length) > 0
                         then { "cache-to": (.cacheTo | lines) }
                         else {} end)
                    )
                  }
                ] | from_entries
              )
            }
            ' > "$bake_file"

          echo "Bake definition ($image_count image(s)):"
          jq . "$bake_file"

          echo "Building with docker buildx bake..."
          docker buildx bake -f "$bake_file"

  # Single job for plan + GitOps/Helm ship (no separate plan / skipped bake nodes).
  ship:
    name: Ship
    needs: [bake]
    if: >-
      always() &&
      (
        inputs.phase == 'deploy' ||
        (inputs.phase == 'all' && (needs.bake.result == 'success' || needs.bake.result == 'skipped'))
      )
    runs-on: ${{ inputs.planning_runner_label }}
    timeout-minutes: 20
    concurrency:
      group: ${{ github.workflow }}-${{ inputs.helm_release != '' && inputs.helm_release || 'multi' }}-ship-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: read
      packages: read
    env:
      GITOPS_REPOSITORY: ${{ inputs.gitops_repository }}
      GITOPS_BRANCH: ${{ inputs.gitops_branch }}
      GITOPS_WEBHOOK_URL: ${{ inputs.gitops_webhook_url }}
      GITOPS_TARGET_REVISION: ${{ inputs.gitops_target_revision || github.head_ref || github.ref_name }}
    steps:
      - name: Plan image builds
        id: plan
        uses: JWilson45/workflows/.github/actions/plan-images@v3.5.0
        with:
          images_json: ${{ inputs.images_json }}
          products_json: ${{ inputs.products_json }}
          do_deploy: ${{ inputs.do_deploy }}
          helm_release: ${{ inputs.helm_release }}
          kube_namespace: ${{ inputs.kube_namespace }}
          helm_chart: ${{ inputs.helm_chart }}
          helm_values_file: ${{ inputs.helm_values_file }}

      - name: Skip ship when plan says no deploy
        if: steps.plan.outputs.should_deploy != 'true'
        shell: bash
        run: echo "should_deploy=false; nothing to ship."

      - name: Plan Helm deploy mode
        id: helm_deploy
        if: steps.plan.outputs.should_deploy == 'true'
        shell: bash
        env:
          KUBECONFIG_B64: ${{ secrets.kubeconfig_b64 }}
        run: |
          set -euo pipefail
          enabled=false
          if [ -z "$GITOPS_REPOSITORY" ] || [ -n "$KUBECONFIG_B64" ]; then
            enabled=true
          fi
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - name: Checkout repo
        if: steps.plan.outputs.should_deploy == 'true' && steps.helm_deploy.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Helm
        if: steps.plan.outputs.should_deploy == 'true' && steps.helm_deploy.outputs.enabled == 'true'
        uses: azure/setup-helm@v4

      - name: Load kubeconfig
        if: steps.plan.outputs.should_deploy == 'true' && steps.helm_deploy.outputs.enabled == 'true'
        shell: bash
        env:
          KUBECONFIG_B64: ${{ secrets.kubeconfig_b64 }}
        run: |
          set -euo pipefail
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "kubeconfig_b64 is required when Helm deployment is enabled." >&2
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Helm upgrade/install
        if: steps.plan.outputs.should_deploy == 'true' && steps.helm_deploy.outputs.enabled == 'true'
        shell: bash
        env:
          MULTI_PRODUCT: ${{ steps.plan.outputs.multi_product }}
          PRODUCTS_PLAN: ${{ steps.plan.outputs.products_plan }}
          HELM_SET_ARGS: ${{ steps.plan.outputs.helm_set_args }}
        run: |
          set -euo pipefail
          if [ "$MULTI_PRODUCT" = "true" ]; then
            while IFS= read -r product; do
              release="$(jq -r '.helm_release' <<< "$product")"
              chart="$(jq -r '.helm_chart' <<< "$product")"
              values="$(jq -r '.helm_values_file' <<< "$product")"
              namespace="$(jq -r '.kube_namespace' <<< "$product")"
              timeout="$(jq -r '.helm_timeout // "3m"' <<< "$product")"
              set_args="$(jq -r '.helm_set_args' <<< "$product")"
              echo "Helm upgrade $release in $namespace"
              helm upgrade --install \
                "$release" \
                "$chart" \
                -f "$values" \
                -n "$namespace" \
                --set-string "$set_args" \
                --rollback-on-failure \
                --wait \
                --timeout "$timeout" \
                --history-max 5
            done < <(jq -c '.[]' <<< "$PRODUCTS_PLAN")
          else
            helm upgrade --install \
              "${{ inputs.helm_release }}" \
              "${{ inputs.helm_chart }}" \
              -f "${{ inputs.helm_values_file }}" \
              -n "${{ inputs.kube_namespace }}" \
              --set-string "$HELM_SET_ARGS" \
              --rollback-on-failure \
              --wait \
              --timeout "${{ inputs.helm_timeout }}" \
              --history-max 5
          fi

      - name: Checkout GitOps repo
        if: steps.plan.outputs.should_deploy == 'true' && inputs.gitops_repository != ''
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.gitops_repository }}
          ref: ${{ inputs.gitops_branch }}
          token: ${{ secrets.gitops_token }}
          path: gitops
          fetch-depth: 1

      - name: Update GitOps application(s)
        if: steps.plan.outputs.should_deploy == 'true' && inputs.gitops_repository != ''
        id: update_gitops
        shell: bash
        env:
          MULTI_PRODUCT: ${{ steps.plan.outputs.multi_product }}
          PRODUCTS_PLAN: ${{ steps.plan.outputs.products_plan }}
          HELM_SET_ARGS: ${{ steps.plan.outputs.helm_set_args }}
          APPLICATION_FILE: ${{ inputs.gitops_application_file }}
          HELM_RELEASE: ${{ inputs.helm_release }}
          GITOPS_UPDATE_TARGET_REVISION_DEFAULT: ${{ inputs.gitops_update_target_revision }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path
          import json
          import os

          def apply_updates(path: Path, updates: dict, update_target_revision: bool, target_revision: str) -> None:
              if not path.exists():
                  raise SystemExit(f"{path} does not exist")
              lines = path.read_text().splitlines()
              current = None
              seen = set()
              for i, line in enumerate(lines):
                  stripped = line.strip()
                  if stripped.startswith("- name: "):
                      name = stripped.removeprefix("- name: ").strip().strip('"').strip("'")
                      current = name if name in updates else None
                  elif stripped.startswith("name: "):
                      name = stripped.removeprefix("name: ").strip().strip('"').strip("'")
                      current = name if name in updates else None
                  elif current and stripped.startswith("value:"):
                      indent = line[: len(line) - len(line.lstrip())]
                      lines[i] = f"{indent}value: {updates[current]}"
                      seen.add(current)
                      current = None

              missing = sorted(set(updates) - seen)
              if missing:
                  raise SystemExit(f"Missing Helm parameter(s) in {path}: {', '.join(missing)}")

              if update_target_revision:
                  if not target_revision:
                      raise SystemExit("gitops_update_target_revision is true but no target revision was resolved")
                  for i, line in enumerate(lines):
                      stripped = line.strip()
                      if stripped.startswith("targetRevision:"):
                          indent = line[: len(line) - len(line.lstrip())]
                          lines[i] = f"{indent}targetRevision: {json.dumps(target_revision)}"
                          break
                  else:
                      raise SystemExit(f"Missing targetRevision in {path}")

              path.write_text("\n".join(lines) + "\n")

          multi = os.environ.get("MULTI_PRODUCT") == "true"
          target_revision = os.environ.get("GITOPS_TARGET_REVISION", "").strip()
          changed_files = []
          release_names = []

          if multi:
              products = json.loads(os.environ.get("PRODUCTS_PLAN") or "[]")
              if not products:
                  raise SystemExit("No products planned for GitOps update")
              for product in products:
                  app_file = product.get("gitops_application_file") or ""
                  if not app_file:
                      raise SystemExit(f"Product {product.get('name')} missing gitops_application_file")
                  helm_set = product.get("helm_set_args") or ""
                  if not helm_set:
                      raise SystemExit(f"Product {product.get('name')} missing helm_set_args")
                  updates = {}
                  for item in helm_set.split(","):
                      if "=" not in item:
                          raise SystemExit(f"Invalid Helm set argument: {item}")
                      name, value = item.split("=", 1)
                      updates[name] = value
                  update_tr = product.get("gitops_update_target_revision")
                  if update_tr is None:
                      update_tr = os.environ.get("GITOPS_UPDATE_TARGET_REVISION_DEFAULT") == "true"
                  else:
                      update_tr = bool(update_tr)
                  path = Path("gitops") / app_file
                  apply_updates(path, updates, update_tr, target_revision)
                  changed_files.append(app_file)
                  release_names.append(product.get("helm_release") or product.get("name") or app_file)
          else:
              app_file = os.environ.get("APPLICATION_FILE") or ""
              helm_set = os.environ.get("HELM_SET_ARGS") or ""
              if not app_file:
                  raise SystemExit("gitops_application_file is required when gitops_repository is set.")
              if not helm_set:
                  raise SystemExit("No Helm image tag parameters were planned.")
              updates = {}
              for item in helm_set.split(","):
                  if "=" not in item:
                      raise SystemExit(f"Invalid Helm set argument: {item}")
                  name, value = item.split("=", 1)
                  updates[name] = value
              update_tr = os.environ.get("GITOPS_UPDATE_TARGET_REVISION_DEFAULT") == "true"
              path = Path("gitops") / app_file
              apply_updates(path, updates, update_tr, target_revision)
              changed_files.append(app_file)
              release_names.append(os.environ.get("HELM_RELEASE") or app_file)

          Path("/tmp/gitops-files.txt").write_text("\n".join(changed_files) + "\n")
          Path("/tmp/gitops-releases.txt").write_text(", ".join(release_names))
          print("Updated:", ", ".join(changed_files))
          PY

          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/gitops-files.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "releases=$(cat /tmp/gitops-releases.txt)" >> "$GITHUB_OUTPUT"

      - name: Push GitOps update
        id: push_gitops_update
        if: steps.plan.outputs.should_deploy == 'true' && inputs.gitops_repository != ''
        working-directory: gitops
        shell: bash
        env:
          MULTI_PRODUCT: ${{ steps.plan.outputs.multi_product }}
          CHANGED_FILES: ${{ steps.update_gitops.outputs.files }}
          RELEASES: ${{ steps.update_gitops.outputs.releases }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No GitOps changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            git add "$f"
          done <<< "$CHANGED_FILES"
          if [ "$MULTI_PRODUCT" = "true" ]; then
            msg="Update GitOps deployments: $RELEASES"
          else
            msg="Update ${{ inputs.helm_release }} GitOps deployment"
          fi
          git commit -m "$msg"
          for attempt in 1 2 3 4 5; do
            git fetch origin "${{ inputs.gitops_branch }}"
            git rebase "origin/${{ inputs.gitops_branch }}"
            if git push origin HEAD:${{ inputs.gitops_branch }}; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "GitOps push attempt $attempt failed; retrying after rebase." >&2
            sleep $((attempt * 2))
          done
          echo "Failed to push GitOps update after retrying." >&2
          exit 1

      - name: Trigger Argo CD webhook
        if: steps.plan.outputs.should_deploy == 'true' && inputs.gitops_repository != '' && steps.push_gitops_update.outputs.changed == 'true'
        working-directory: gitops
        shell: bash
        env:
          GITOPS_WEBHOOK_SECRET: ${{ secrets.gitops_webhook_secret }}
        run: |
          set -euo pipefail
          if [ -z "$GITOPS_WEBHOOK_URL" ]; then
            echo "gitops_webhook_url is not set; skipping Argo CD webhook trigger."
            exit 0
          fi

          webhook_url="${GITOPS_WEBHOOK_URL%/}/api/webhook"
          payload_file="$(mktemp)"
          signature_file="$(mktemp)"
          commit_sha="$(git rev-parse HEAD)"
          repo_url="https://github.com/${{ inputs.gitops_repository }}.git"

          jq -cn \
            --arg ref "refs/heads/$GITOPS_BRANCH" \
            --arg before "" \
            --arg after "$commit_sha" \
            --arg clone_url "$repo_url" \
            --arg html_url "https://github.com/${{ inputs.gitops_repository }}" \
            '{ref:$ref,before:$before,after:$after,repository:{clone_url:$clone_url,html_url:$html_url,url:$html_url}}' \
            > "$payload_file"

          headers=(
            -H "Content-Type: application/json"
            -H "X-GitHub-Event: push"
            -H "X-GitHub-Delivery: $GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          )

          if [ -n "$GITOPS_WEBHOOK_SECRET" ]; then
            python3 - "$GITOPS_WEBHOOK_SECRET" "$payload_file" "$signature_file" <<'PY'
          import hmac
          import hashlib
          import sys
          from pathlib import Path

          secret = sys.argv[1].encode()
          payload = Path(sys.argv[2]).read_bytes()
          signature = hmac.new(secret, payload, hashlib.sha256).hexdigest()
          Path(sys.argv[3]).write_text(f"sha256={signature}")
          PY
            headers+=(-H "X-Hub-Signature-256: $(cat "$signature_file")")
          fi

          curl -fsSL -X POST "${headers[@]}" --data-binary "@$payload_file" "$webhook_url"
