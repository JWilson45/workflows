name: Build & Deploy Images

on:
  workflow_call:
    inputs:
      images_json:
        description: JSON array of images to plan/build (name, image, appDir, dockerTarget, helmTagPath, optional context/dockerfile)
        required: true
        type: string
      # Multi-product atomic deploy. When non-empty, kube_namespace/helm_* / gitops_application_file
      # single-product fields are ignored in favor of per-product entries.
      products_json:
        description: JSON array of products to deploy atomically (optional). See README.
        required: false
        default: ""
        type: string
      platforms:
        required: false
        default: linux/amd64
        type: string
      kube_namespace:
        required: false
        default: ""
        type: string
      planning_runner_label:
        required: false
        default: mm-runner-set-no-dind
        type: string
      build_runner_label:
        required: false
        default: mm-runner-set
        type: string
      helm_release:
        required: false
        default: ""
        type: string
      helm_chart:
        required: false
        default: ""
        type: string
      helm_values_file:
        required: false
        default: ""
        type: string
      helm_timeout:
        required: false
        default: 3m
        type: string
      do_deploy:
        required: false
        default: true
        type: boolean
      gitops_repository:
        required: false
        default: ""
        type: string
      gitops_application_file:
        required: false
        default: ""
        type: string
      gitops_branch:
        required: false
        default: main
        type: string
      gitops_update_target_revision:
        required: false
        default: false
        type: boolean
      gitops_target_revision:
        required: false
        default: ""
        type: string
      gitops_webhook_url:
        required: false
        default: ""
        type: string
    secrets:
      kubeconfig_b64:
        required: false
      dockerhub_username:
        required: false
      dockerhub_token:
        required: false
      gitops_token:
        required: false
      gitops_webhook_secret:
        required: false

jobs:
  plan:
    runs-on: ${{ inputs.planning_runner_label }}
    timeout-minutes: 10
    concurrency:
      group: ${{ github.workflow }}-${{ inputs.helm_release != '' && inputs.helm_release || 'multi' }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: read
    outputs:
      build_matrix: ${{ steps.plan.outputs.build_matrix }}
      helm_set_args: ${{ steps.plan.outputs.helm_set_args }}
      products_plan: ${{ steps.plan.outputs.products_plan }}
      multi_product: ${{ steps.plan.outputs.multi_product }}
      should_build: ${{ steps.plan.outputs.should_build }}
      should_deploy: ${{ steps.plan.outputs.should_deploy }}
    env:
      IMAGES_JSON: ${{ inputs.images_json }}
      PRODUCTS_JSON: ${{ inputs.products_json }}
    steps:
      - name: Plan image builds
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          images_file="$(mktemp)"
          printf '%s' "$IMAGES_JSON" > "$images_file"
          jq -e 'type == "array" and length > 0' "$images_file" >/dev/null

          multi_product=false
          products_file="$(mktemp)"
          if [ -n "${PRODUCTS_JSON// }" ]; then
            printf '%s' "$PRODUCTS_JSON" > "$products_file"
            jq -e 'type == "array" and length > 0' "$products_file" >/dev/null
            multi_product=true
          else
            if [ -z "${{ inputs.helm_release }}" ] || [ -z "${{ inputs.kube_namespace }}" ] || [ -z "${{ inputs.helm_chart }}" ] || [ -z "${{ inputs.helm_values_file }}" ]; then
              echo "Single-product mode requires helm_release, kube_namespace, helm_chart, and helm_values_file (or provide products_json)." >&2
              exit 1
            fi
            printf '[]' > "$products_file"
          fi

          pr_number="${{ github.event.pull_request.number }}"
          source_ref="${{ github.sha }}"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.action }}" = "closed" ] && [ -n "${{ github.event.pull_request.merge_commit_sha }}" ]; then
            source_ref="${{ github.event.pull_request.merge_commit_sha }}"
          fi
          cache_pr_number="$pr_number"
          is_open_pr_context=false
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.action }}" != "closed" ]; then
            is_open_pr_context=true
          fi
          if [ -z "$cache_pr_number" ] && [ "${{ github.event_name }}" = "push" ]; then
            associated_prs_json="$(curl -fsSL \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github.groot-preview+json" \
              "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" || true)"
            if [ -n "$associated_prs_json" ]; then
              cache_pr_number="$(jq -r 'if type == "array" then [.[] | select(.merged_at != null)] | sort_by(.number) | last | .number // empty else empty end' <<< "$associated_prs_json")"
            fi
          fi
          short_sha="$(echo "$GITHUB_SHA" | cut -c1-7)"
          build_matrix='[]'
          image_meta='{}'
          helm_set_args=''

          check_tag() {
            local image="$1"
            local tag="$2"
            local registry repo token status
            registry="$(echo "$image" | cut -d'/' -f1)"
            repo="$(echo "$image" | cut -d'/' -f2-)"
            if [ -z "$registry" ] || [ -z "$repo" ] || [ "$registry" = "$image" ]; then
              echo "image must be a full image reference like ghcr.io/org/repo. Got: $image" >&2
              exit 1
            fi
            token="$(curl -s "https://$registry/token?scope=repository:$repo:pull" | jq -r .token)"
            status="$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $token" \
              -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json" \
              "https://$registry/v2/$repo/manifests/$tag")"
            [ "$status" = "200" ]
          }

          append_cache_from() {
            local current="$1"
            local ref="$2"
            if [ -z "$current" ]; then
              printf 'type=registry,ref=%s' "$ref"
            else
              printf '%s\n%s' "$current" "type=registry,ref=$ref"
            fi
          }

          while IFS= read -r image_config; do
            name="$(jq -r '.name // empty' <<< "$image_config")"
            image="$(jq -r '.image // empty' <<< "$image_config")"
            app_dir="$(jq -r '.appDir // empty' <<< "$image_config")"
            docker_target="$(jq -r '.dockerTarget // empty' <<< "$image_config")"
            docker_context="$(jq -r '.context // "."' <<< "$image_config")"
            dockerfile="$(jq -r '.dockerfile // "Dockerfile"' <<< "$image_config")"
            helm_tag_path="$(jq -r '.helmTagPath // empty' <<< "$image_config")"

            if [ -z "$name" ] || [ -z "$image" ] || [ -z "$app_dir" ] || [ -z "$docker_target" ]; then
              echo "Each image entry requires name, image, appDir, and dockerTarget." >&2
              echo "$image_config" >&2
              exit 1
            fi
            if [ "$multi_product" != "true" ] && [ -z "$helm_tag_path" ]; then
              echo "Single-product mode requires helmTagPath on each image entry." >&2
              exit 1
            fi

            registry="$(echo "$image" | cut -d'/' -f1)"
            package_json="$(curl -fsSL \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github.raw" \
              "https://api.github.com/repos/${{ github.repository }}/contents/$app_dir/package.json?ref=$source_ref")"
            version="$(jq -r '.version' <<< "$package_json")"

            if [ "$is_open_pr_context" = "true" ]; then
              image_tag="${version}-pr${pr_number}-${short_sha}"
            else
              image_tag="$version"
            fi

            tags="$image:$image_tag"
            if [ "$is_open_pr_context" != "true" ]; then
              tags="${tags}"$'\n'"$image:latest"
            fi
            cache_tag="$(printf '%s' "$docker_target" | tr -c 'A-Za-z0-9_.-' '-')"
            cache_ref="$image:buildcache-$cache_tag"
            # Shared monorepo deps cache across image names (same Dockerfile deps stage).
            owner_segment="$(echo "$image" | cut -d'/' -f2)"
            shared_deps_image="${registry}/${owner_segment}/mm-buildcache"
            shared_deps_ref="${shared_deps_image}:deps"
            cache_from=""
            cache_to_lines=("type=registry,ref=$cache_ref,mode=max")
            if [ -n "$cache_pr_number" ]; then
              pr_cache_ref="$image:buildcache-$cache_tag-pr$cache_pr_number"
              if check_tag "$image" "buildcache-$cache_tag-pr$cache_pr_number"; then
                cache_from="$(append_cache_from "$cache_from" "$pr_cache_ref")"
              fi
              if [ "$is_open_pr_context" = "true" ]; then
                cache_to_lines=("type=registry,ref=$pr_cache_ref,mode=max")
                cache_to_lines+=("type=registry,ref=${shared_deps_image}:deps-pr${cache_pr_number},mode=max")
              else
                cache_to_lines+=("type=registry,ref=${shared_deps_ref},mode=max")
              fi
            else
              cache_to_lines+=("type=registry,ref=${shared_deps_ref},mode=max")
            fi
            if [ -n "$cache_pr_number" ] && check_tag "$shared_deps_image" "deps-pr${cache_pr_number}"; then
              cache_from="$(append_cache_from "$cache_from" "${shared_deps_image}:deps-pr${cache_pr_number}")"
            fi
            if check_tag "$shared_deps_image" "deps"; then
              cache_from="$(append_cache_from "$cache_from" "$shared_deps_ref")"
            fi
            if check_tag "$image" "buildcache-$cache_tag"; then
              cache_from="$(append_cache_from "$cache_from" "$cache_ref")"
            fi
            cache_to="$(printf '%s\n' "${cache_to_lines[@]}")"

            if ! check_tag "$image" "$image_tag"; then
              matrix_item="$(jq -cn \
                --arg name "$name" \
                --arg image "$image" \
                --arg registry "$registry" \
                --arg dockerTarget "$docker_target" \
                --arg dockerContext "$docker_context" \
                --arg dockerfile "$dockerfile" \
                --arg tags "$tags" \
                --arg cacheFrom "$cache_from" \
                --arg cacheTo "$cache_to" \
                '{name:$name,image:$image,registry:$registry,dockerTarget:$dockerTarget,dockerContext:$dockerContext,dockerfile:$dockerfile,tags:$tags,cacheFrom:$cacheFrom,cacheTo:$cacheTo}')"
              build_matrix="$(jq -c --argjson item "$matrix_item" '. + [$item]' <<< "$build_matrix")"
            fi

            image_meta="$(jq -c \
              --arg name "$name" \
              --arg tag "$image_tag" \
              --arg helmTagPath "$helm_tag_path" \
              '.[$name] = {tag:$tag, helmTagPath:$helmTagPath}' <<< "$image_meta")"

            if [ -n "$helm_tag_path" ]; then
              if [ -n "$helm_set_args" ]; then
                helm_set_args="${helm_set_args},"
              fi
              helm_set_args="${helm_set_args}${helm_tag_path}=${image_tag}"
            fi
          done < <(jq -c '.[]' "$images_file")

          products_plan='[]'
          if [ "$multi_product" = "true" ]; then
            while IFS= read -r product_config; do
              product_name="$(jq -r '.name // empty' <<< "$product_config")"
              do_product_deploy="$(jq -r 'if has("do_deploy") then (.do_deploy|tostring) else "true" end' <<< "$product_config")"
              image_names="$(jq -c '.image_names // []' <<< "$product_config")"
              if [ -z "$product_name" ]; then
                echo "Each product entry requires name." >&2
                exit 1
              fi
              if [ "$(jq 'length' <<< "$image_names")" -eq 0 ]; then
                echo "Product $product_name requires image_names." >&2
                exit 1
              fi

              product_helm_set=''
              while IFS= read -r img_name; do
                [ -z "$img_name" ] && continue
                meta="$(jq -c --arg n "$img_name" '.[$n] // empty' <<< "$image_meta")"
                if [ -z "$meta" ] || [ "$meta" = "null" ]; then
                  echo "Product $product_name references unknown image_name: $img_name" >&2
                  exit 1
                fi
                tag="$(jq -r '.tag' <<< "$meta")"
                path="$(jq -r '.helmTagPath // empty' <<< "$meta")"
                # Prefer per-product helm tag path override map when present
                override="$(jq -r --arg n "$img_name" '.helm_tag_paths[$n] // empty' <<< "$product_config")"
                if [ -n "$override" ]; then
                  path="$override"
                fi
                if [ -z "$path" ]; then
                  echo "No helmTagPath for image $img_name (product $product_name)." >&2
                  exit 1
                fi
                if [ -n "$product_helm_set" ]; then
                  product_helm_set="${product_helm_set},"
                fi
                product_helm_set="${product_helm_set}${path}=${tag}"
              done < <(jq -r '.[]' <<< "$image_names")

              if [ "$do_product_deploy" != "true" ]; then
                echo "Product $product_name is build-only (do_deploy=false); skipping deploy plan entry."
                continue
              fi

              planned="$(jq -cn \
                --argjson base "$product_config" \
                --arg helm_set_args "$product_helm_set" \
                '$base + {helm_set_args:$helm_set_args} | del(.image_names, .helm_tag_paths)')"
              products_plan="$(jq -c --argjson item "$planned" '. + [$item]' <<< "$products_plan")"
            done < <(jq -c '.[]' "$products_file")
          fi

          should_build=false
          if [ "$(jq 'length' <<< "$build_matrix")" -gt 0 ]; then
            should_build=true
          fi

          # Deploy is independent of whether any image needs a rebuild. Callers that
          # split build/deploy (or only change helm values) still need GitOps updates
          # when tags already exist. No-op tag writes are harmless: the GitOps step
          # skips the commit when the Application files are unchanged.
          should_deploy=false
          if [ "${{ inputs.do_deploy }}" = "true" ]; then
            if [ "$multi_product" = "true" ]; then
              if [ "$(jq 'length' <<< "$products_plan")" -gt 0 ]; then
                should_deploy=true
              fi
            elif [ -n "$helm_set_args" ]; then
              should_deploy=true
            fi
          fi

          echo "multi_product=$multi_product"
          echo "should_build=$should_build"
          echo "should_deploy=$should_deploy"
          echo "images to build: $(jq -c '[.[].name]' <<< "$build_matrix")"
          echo "products to deploy: $(jq -c '[.[].name]' <<< "$products_plan")"

          {
            echo "build_matrix=$build_matrix"
            echo "helm_set_args=$helm_set_args"
            echo "multi_product=$multi_product"
            echo "should_build=$should_build"
            echo "should_deploy=$should_deploy"
            echo "products_plan<<PLAN_EOF"
            echo "$products_plan"
            echo "PLAN_EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    # Single job for all planned images so BuildKit shares intermediate stages
    # (e.g. monorepo deps) and only one DinD runner is claimed per workflow run.
    name: Build images
    needs: plan
    if: needs.plan.outputs.should_build == 'true'
    runs-on: ${{ inputs.build_runner_label }}
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    env:
      BUILD_MATRIX: ${{ needs.plan.outputs.build_matrix }}
      PLATFORMS: ${{ inputs.platforms }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merge_commit_sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to image registries
        shell: bash
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          while IFS= read -r registry; do
            [ -z "$registry" ] && continue
            echo "Logging in to $registry"
            echo "$REGISTRY_TOKEN" | docker login "$registry" -u "$REGISTRY_USER" --password-stdin
          done < <(jq -r '.[].registry' <<< "$BUILD_MATRIX" | sort -u)

      - name: Check Docker Hub credentials
        id: dockerhub
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.dockerhub_username }}
          DOCKERHUB_TOKEN: ${{ secrets.dockerhub_token }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}

      - name: Generate bake file and build all images
        shell: bash
        run: |
          set -euo pipefail

          image_count="$(jq 'length' <<< "$BUILD_MATRIX")"
          if [ "$image_count" -eq 0 ]; then
            echo "No images to build."
            exit 0
          fi

          platforms_json="$(printf '%s' "$PLATFORMS" | tr ',' '\n' | sed '/^$/d' | jq -R . | jq -s -c .)"
          bake_file="$(mktemp)"

          jq -n \
            --argjson images "$BUILD_MATRIX" \
            --argjson platforms "$platforms_json" \
            '
            def lines:
              if . == null or . == "" then []
              else (split("\n") | map(select(length > 0)))
              end;

            {
              group: {
                default: {
                  targets: [ $images[].name ]
                }
              },
              target: (
                [ $images[] | {
                    key: .name,
                    value: (
                      {
                        context: .dockerContext,
                        dockerfile: .dockerfile,
                        target: .dockerTarget,
                        tags: (.tags | lines),
                        platforms: $platforms,
                        output: ["type=image,push=true"],
                        attest: [
                          "type=provenance,mode=max",
                          "type=sbom"
                        ]
                      }
                      + (if (.cacheFrom | lines | length) > 0
                         then { "cache-from": (.cacheFrom | lines) }
                         else {} end)
                      + (if (.cacheTo | lines | length) > 0
                         then { "cache-to": (.cacheTo | lines) }
                         else {} end)
                    )
                  }
                ] | from_entries
              )
            }
            ' > "$bake_file"

          echo "Bake definition ($image_count image(s)):"
          jq . "$bake_file"

          echo "Building with docker buildx bake..."
          docker buildx bake -f "$bake_file"

  deploy:
    needs:
      - plan
      - build
    if: >-
      always() &&
      needs.plan.outputs.should_deploy == 'true' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ${{ inputs.planning_runner_label }}
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      MULTI_PRODUCT: ${{ needs.plan.outputs.multi_product }}
      PRODUCTS_PLAN: ${{ needs.plan.outputs.products_plan }}
      HELM_SET_ARGS: ${{ needs.plan.outputs.helm_set_args }}
      GITOPS_REPOSITORY: ${{ inputs.gitops_repository }}
      GITOPS_BRANCH: ${{ inputs.gitops_branch }}
      GITOPS_WEBHOOK_URL: ${{ inputs.gitops_webhook_url }}
      GITOPS_TARGET_REVISION: ${{ inputs.gitops_target_revision || github.head_ref || github.ref_name }}
    steps:
      - name: Plan Helm deploy mode
        id: helm_deploy
        shell: bash
        env:
          KUBECONFIG_B64: ${{ secrets.kubeconfig_b64 }}
        run: |
          set -euo pipefail
          enabled=false
          if [ -z "$GITOPS_REPOSITORY" ] || [ -n "$KUBECONFIG_B64" ]; then
            enabled=true
          fi
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - name: Checkout repo
        if: steps.helm_deploy.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Helm
        if: steps.helm_deploy.outputs.enabled == 'true'
        uses: azure/setup-helm@v4

      - name: Load kubeconfig
        if: steps.helm_deploy.outputs.enabled == 'true'
        shell: bash
        env:
          KUBECONFIG_B64: ${{ secrets.kubeconfig_b64 }}
        run: |
          set -euo pipefail
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "kubeconfig_b64 is required when Helm deployment is enabled." >&2
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Helm upgrade/install
        if: steps.helm_deploy.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ "$MULTI_PRODUCT" = "true" ]; then
            while IFS= read -r product; do
              release="$(jq -r '.helm_release' <<< "$product")"
              chart="$(jq -r '.helm_chart' <<< "$product")"
              values="$(jq -r '.helm_values_file' <<< "$product")"
              namespace="$(jq -r '.kube_namespace' <<< "$product")"
              timeout="$(jq -r '.helm_timeout // "3m"' <<< "$product")"
              set_args="$(jq -r '.helm_set_args' <<< "$product")"
              echo "Helm upgrade $release in $namespace"
              helm upgrade --install \
                "$release" \
                "$chart" \
                -f "$values" \
                -n "$namespace" \
                --set-string "$set_args" \
                --rollback-on-failure \
                --wait \
                --timeout "$timeout" \
                --history-max 5
            done < <(jq -c '.[]' <<< "$PRODUCTS_PLAN")
          else
            helm upgrade --install \
              "${{ inputs.helm_release }}" \
              "${{ inputs.helm_chart }}" \
              -f "${{ inputs.helm_values_file }}" \
              -n "${{ inputs.kube_namespace }}" \
              --set-string "$HELM_SET_ARGS" \
              --rollback-on-failure \
              --wait \
              --timeout "${{ inputs.helm_timeout }}" \
              --history-max 5
          fi

      - name: Checkout GitOps repo
        if: inputs.gitops_repository != ''
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.gitops_repository }}
          ref: ${{ inputs.gitops_branch }}
          token: ${{ secrets.gitops_token }}
          path: gitops
          fetch-depth: 1

      - name: Update GitOps application(s)
        if: inputs.gitops_repository != ''
        id: update_gitops
        shell: bash
        env:
          APPLICATION_FILE: ${{ inputs.gitops_application_file }}
          HELM_RELEASE: ${{ inputs.helm_release }}
          GITOPS_UPDATE_TARGET_REVISION_DEFAULT: ${{ inputs.gitops_update_target_revision }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path
          import json
          import os

          def apply_updates(path: Path, updates: dict, update_target_revision: bool, target_revision: str) -> None:
              if not path.exists():
                  raise SystemExit(f"{path} does not exist")
              lines = path.read_text().splitlines()
              current = None
              seen = set()
              for i, line in enumerate(lines):
                  stripped = line.strip()
                  if stripped.startswith("- name: "):
                      name = stripped.removeprefix("- name: ").strip().strip('"').strip("'")
                      current = name if name in updates else None
                  elif stripped.startswith("name: "):
                      name = stripped.removeprefix("name: ").strip().strip('"').strip("'")
                      current = name if name in updates else None
                  elif current and stripped.startswith("value:"):
                      indent = line[: len(line) - len(line.lstrip())]
                      lines[i] = f"{indent}value: {updates[current]}"
                      seen.add(current)
                      current = None

              missing = sorted(set(updates) - seen)
              if missing:
                  raise SystemExit(f"Missing Helm parameter(s) in {path}: {', '.join(missing)}")

              if update_target_revision:
                  if not target_revision:
                      raise SystemExit("gitops_update_target_revision is true but no target revision was resolved")
                  for i, line in enumerate(lines):
                      stripped = line.strip()
                      if stripped.startswith("targetRevision:"):
                          indent = line[: len(line) - len(line.lstrip())]
                          lines[i] = f"{indent}targetRevision: {json.dumps(target_revision)}"
                          break
                  else:
                      raise SystemExit(f"Missing targetRevision in {path}")

              path.write_text("\n".join(lines) + "\n")

          multi = os.environ.get("MULTI_PRODUCT") == "true"
          target_revision = os.environ.get("GITOPS_TARGET_REVISION", "").strip()
          changed_files = []
          release_names = []

          if multi:
              products = json.loads(os.environ.get("PRODUCTS_PLAN") or "[]")
              if not products:
                  raise SystemExit("No products planned for GitOps update")
              for product in products:
                  app_file = product.get("gitops_application_file") or ""
                  if not app_file:
                      raise SystemExit(f"Product {product.get('name')} missing gitops_application_file")
                  helm_set = product.get("helm_set_args") or ""
                  if not helm_set:
                      raise SystemExit(f"Product {product.get('name')} missing helm_set_args")
                  updates = {}
                  for item in helm_set.split(","):
                      if "=" not in item:
                          raise SystemExit(f"Invalid Helm set argument: {item}")
                      name, value = item.split("=", 1)
                      updates[name] = value
                  update_tr = product.get("gitops_update_target_revision")
                  if update_tr is None:
                      update_tr = os.environ.get("GITOPS_UPDATE_TARGET_REVISION_DEFAULT") == "true"
                  else:
                      update_tr = bool(update_tr)
                  path = Path("gitops") / app_file
                  apply_updates(path, updates, update_tr, target_revision)
                  changed_files.append(app_file)
                  release_names.append(product.get("helm_release") or product.get("name") or app_file)
          else:
              app_file = os.environ.get("APPLICATION_FILE") or ""
              helm_set = os.environ.get("HELM_SET_ARGS") or ""
              if not app_file:
                  raise SystemExit("gitops_application_file is required when gitops_repository is set.")
              if not helm_set:
                  raise SystemExit("No Helm image tag parameters were planned.")
              updates = {}
              for item in helm_set.split(","):
                  if "=" not in item:
                      raise SystemExit(f"Invalid Helm set argument: {item}")
                  name, value = item.split("=", 1)
                  updates[name] = value
              update_tr = os.environ.get("GITOPS_UPDATE_TARGET_REVISION_DEFAULT") == "true"
              path = Path("gitops") / app_file
              apply_updates(path, updates, update_tr, target_revision)
              changed_files.append(app_file)
              release_names.append(os.environ.get("HELM_RELEASE") or app_file)

          Path("/tmp/gitops-files.txt").write_text("\n".join(changed_files) + "\n")
          Path("/tmp/gitops-releases.txt").write_text(", ".join(release_names))
          print("Updated:", ", ".join(changed_files))
          PY

          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/gitops-files.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "releases=$(cat /tmp/gitops-releases.txt)" >> "$GITHUB_OUTPUT"

      - name: Push GitOps update
        id: push_gitops_update
        if: inputs.gitops_repository != ''
        working-directory: gitops
        shell: bash
        env:
          CHANGED_FILES: ${{ steps.update_gitops.outputs.files }}
          RELEASES: ${{ steps.update_gitops.outputs.releases }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No GitOps changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            git add "$f"
          done <<< "$CHANGED_FILES"
          if [ "$MULTI_PRODUCT" = "true" ]; then
            msg="Update GitOps deployments: $RELEASES"
          else
            msg="Update ${{ inputs.helm_release }} GitOps deployment"
          fi
          git commit -m "$msg"
          for attempt in 1 2 3 4 5; do
            git fetch origin "${{ inputs.gitops_branch }}"
            git rebase "origin/${{ inputs.gitops_branch }}"
            if git push origin HEAD:${{ inputs.gitops_branch }}; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "GitOps push attempt $attempt failed; retrying after rebase." >&2
            sleep $((attempt * 2))
          done
          echo "Failed to push GitOps update after retrying." >&2
          exit 1

      - name: Trigger Argo CD webhook
        if: inputs.gitops_repository != '' && steps.push_gitops_update.outputs.changed == 'true'
        working-directory: gitops
        shell: bash
        env:
          GITOPS_WEBHOOK_SECRET: ${{ secrets.gitops_webhook_secret }}
        run: |
          set -euo pipefail
          if [ -z "$GITOPS_WEBHOOK_URL" ]; then
            echo "gitops_webhook_url is not set; skipping Argo CD webhook trigger."
            exit 0
          fi

          webhook_url="${GITOPS_WEBHOOK_URL%/}/api/webhook"
          payload_file="$(mktemp)"
          signature_file="$(mktemp)"
          commit_sha="$(git rev-parse HEAD)"
          repo_url="https://github.com/${{ inputs.gitops_repository }}.git"

          jq -cn \
            --arg ref "refs/heads/$GITOPS_BRANCH" \
            --arg before "" \
            --arg after "$commit_sha" \
            --arg clone_url "$repo_url" \
            --arg html_url "https://github.com/${{ inputs.gitops_repository }}" \
            '{ref:$ref,before:$before,after:$after,repository:{clone_url:$clone_url,html_url:$html_url,url:$html_url}}' \
            > "$payload_file"

          headers=(
            -H "Content-Type: application/json"
            -H "X-GitHub-Event: push"
            -H "X-GitHub-Delivery: $GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          )

          if [ -n "$GITOPS_WEBHOOK_SECRET" ]; then
            python3 - "$GITOPS_WEBHOOK_SECRET" "$payload_file" "$signature_file" <<'PY'
          import hmac
          import hashlib
          import sys
          from pathlib import Path

          secret = sys.argv[1].encode()
          payload = Path(sys.argv[2]).read_bytes()
          signature = hmac.new(secret, payload, hashlib.sha256).hexdigest()
          Path(sys.argv[3]).write_text(f"sha256={signature}")
          PY
            headers+=(-H "X-Hub-Signature-256: $(cat "$signature_file")")
          fi

          curl -fsSL -X POST "${headers[@]}" --data-binary "@$payload_file" "$webhook_url"
