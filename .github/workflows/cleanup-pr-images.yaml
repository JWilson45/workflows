name: Cleanup GHCR Images

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: "Image(s), comma-separated"
        required: false
        default: ""
        type: string
      pr_numbers:
        description: "PRs (e.g. 123,456). Blank = all PR-tagged versions"
        required: false
        default: ""
        type: string
      older_than_days:
        description: "Delete versions older than N days"
        required: true
        default: 7
        type: number
      execute:
        description: "Execute stage 2 deletion after the dry-run plan"
        required: true
        default: false
        type: boolean
      require_approval:
        description: "Require delete environment approval"
        required: true
        default: true
        type: boolean
      pr_repository:
        description: "Repository that owns the PR numbers in image tags (owner/repository; blank = this repository)"
        required: false
        default: ""
        type: string
      protect_open_prs:
        description: "Protect artifacts whose source PR is still open"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  pull-requests: read
  packages: write

concurrency:
  group: ghcr-image-cleanup-${{ github.repository }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: workflows-runner-set
    permissions:
      contents: read
      pull-requests: read
      packages: write
    outputs:
      candidate_count: ${{ steps.plan.outputs.candidate_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: |
            .github/scripts/ghcr-cleanup

      - name: Build delete plan (dry run)
        id: plan
        uses: actions/github-script@v7
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          PR_NUMBERS: ${{ inputs.pr_numbers }}
          OLDER_THAN_DAYS: ${{ inputs.older_than_days }}
          PR_REPOSITORY: ${{ inputs.pr_repository }}
          PROTECT_OPEN_PRS: ${{ inputs.protect_open_prs }}
          PR_READ_TOKEN: ${{ secrets.MICROMARKETING_PR_READ_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/ghcr-cleanup/plan.js`);
            await run({ github, context, core, process });

      - name: Upload delete plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: delete-plan
          path: delete-plan.json
          if-no-files-found: error
          retention-days: 30

  delete:
    needs: plan
    if: needs.plan.result == 'success' && needs.plan.outputs.candidate_count != '0' && inputs.execute && inputs.require_approval
    runs-on: workflows-runner-set
    environment: delete
    permissions:
      contents: read
      pull-requests: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: |
            .github/scripts/ghcr-cleanup

      - name: Download delete plan artifact
        uses: actions/download-artifact@v4
        with:
          name: delete-plan
          path: .

      - name: Delete planned versions (stage 2)
        uses: actions/github-script@v7
        env:
          DELETE_MODE: "stage 2"
          PR_READ_TOKEN: ${{ secrets.MICROMARKETING_PR_READ_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/ghcr-cleanup/delete.js`);
            await run({ github, context, core, process });

  delete-no-approval:
    needs: plan
    if: needs.plan.result == 'success' && needs.plan.outputs.candidate_count != '0' && inputs.execute && !inputs.require_approval
    runs-on: workflows-runner-set
    permissions:
      contents: read
      pull-requests: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: |
            .github/scripts/ghcr-cleanup

      - name: Download delete plan artifact
        uses: actions/download-artifact@v4
        with:
          name: delete-plan
          path: .

      - name: Delete planned versions (stage 2, no approval)
        uses: actions/github-script@v7
        env:
          DELETE_MODE: "stage 2, no approval"
          PR_READ_TOKEN: ${{ secrets.MICROMARKETING_PR_READ_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/ghcr-cleanup/delete.js`);
            await run({ github, context, core, process });
