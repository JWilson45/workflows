name: Deploy Products

# Single-job reusable workflow: plan tags + Helm/GitOps ship.
# Intended for monorepo CI graphs that gate deploy on test + bake.

on:
  workflow_call:
    inputs:
      images_json:
        required: true
        type: string
      products_json:
        required: false
        default: ""
        type: string
      use_preplanned_plan:
        required: false
        default: false
        type: boolean
      preplanned_products_plan:
        required: false
        default: "[]"
        type: string
      planning_runner_label:
        required: false
        default: mm-runner-set-no-dind
        type: string
      kube_namespace:
        required: false
        default: ""
        type: string
      helm_release:
        required: false
        default: ""
        type: string
      helm_chart:
        required: false
        default: ""
        type: string
      helm_values_file:
        required: false
        default: ""
        type: string
      helm_timeout:
        required: false
        default: 3m
        type: string
      do_deploy:
        required: false
        default: true
        type: boolean
      gitops_repository:
        required: false
        default: ""
        type: string
      gitops_application_file:
        required: false
        default: ""
        type: string
      gitops_branch:
        required: false
        default: main
        type: string
      gitops_update_target_revision:
        required: false
        default: false
        type: boolean
      gitops_target_revision:
        required: false
        default: ""
        type: string
      gitops_webhook_url:
        required: false
        default: ""
        type: string
      gitops_webhook_urls_json:
        required: false
        default: "{}"
        type: string
    secrets:
      kubeconfig_b64:
        required: false
      gitops_token:
        required: false
      gitops_webhook_secret:
        required: false

jobs:
  ship:
    name: Ship
    runs-on: ${{ inputs.planning_runner_label }}
    timeout-minutes: 20
    concurrency:
      group: ${{ github.workflow }}-${{ inputs.helm_release != '' && inputs.helm_release || 'multi' }}-ship-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: read
      packages: read
    env:
      GITOPS_REPOSITORY: ${{ inputs.gitops_repository }}
      GITOPS_BRANCH: ${{ inputs.gitops_branch }}
      GITOPS_WEBHOOK_URL: ${{ inputs.gitops_webhook_url }}
      GITOPS_WEBHOOK_URLS_JSON: ${{ inputs.gitops_webhook_urls_json }}
      GITOPS_TARGET_REVISION: ${{ inputs.gitops_target_revision || github.head_ref || github.ref_name }}
    steps:
      - name: Plan image builds
        id: plan
        if: inputs.use_preplanned_plan != true
        uses: JWilson45/workflows/.github/actions/plan-images@v3.5.3
        with:
          images_json: ${{ inputs.images_json }}
          products_json: ${{ inputs.products_json }}
          do_deploy: ${{ inputs.do_deploy }}
          helm_release: ${{ inputs.helm_release }}
          kube_namespace: ${{ inputs.kube_namespace }}
          helm_chart: ${{ inputs.helm_chart }}
          helm_values_file: ${{ inputs.helm_values_file }}

      - name: Resolve deployment plan
        id: resolved_plan
        shell: bash
        env:
          USE_PREPLANNED_PLAN: ${{ inputs.use_preplanned_plan }}
          PREPLANNED_PRODUCTS_PLAN: ${{ inputs.preplanned_products_plan }}
          PLANNED_PRODUCTS_PLAN: ${{ steps.plan.outputs.products_plan }}
          PLANNED_MULTI_PRODUCT: ${{ steps.plan.outputs.multi_product }}
          PLANNED_HELM_SET_ARGS: ${{ steps.plan.outputs.helm_set_args }}
          PLANNED_SHOULD_DEPLOY: ${{ steps.plan.outputs.should_deploy }}
        run: |
          set -euo pipefail
          if [ "$USE_PREPLANNED_PLAN" = "true" ]; then
            products_plan="$PREPLANNED_PRODUCTS_PLAN"
            jq -e 'type == "array"' <<< "$products_plan" >/dev/null
            multi_product=true
            if [ "$(jq 'length' <<< "$products_plan")" -gt 0 ]; then
              should_deploy=true
            else
              should_deploy=false
            fi
            helm_set_args=""
          else
            products_plan="$PLANNED_PRODUCTS_PLAN"
            multi_product="$PLANNED_MULTI_PRODUCT"
            should_deploy="$PLANNED_SHOULD_DEPLOY"
            helm_set_args="$PLANNED_HELM_SET_ARGS"
          fi
          echo "products_plan=$products_plan" >> "$GITHUB_OUTPUT"
          echo "multi_product=$multi_product" >> "$GITHUB_OUTPUT"
          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"
          echo "helm_set_args=$helm_set_args" >> "$GITHUB_OUTPUT"

      - name: Skip ship when plan says no deploy
        if: steps.resolved_plan.outputs.should_deploy != 'true'
        shell: bash
        run: echo "should_deploy=false; nothing to ship."

      - name: Plan Helm deploy mode
        id: helm_deploy
        if: steps.resolved_plan.outputs.should_deploy == 'true'
        shell: bash
        env:
          KUBECONFIG_B64: ${{ secrets.kubeconfig_b64 }}
        run: |
          set -euo pipefail
          enabled=false
          if [ -z "$GITOPS_REPOSITORY" ] || [ -n "$KUBECONFIG_B64" ]; then
            enabled=true
          fi
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - name: Checkout repo
        if: steps.resolved_plan.outputs.should_deploy == 'true' && steps.helm_deploy.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Helm
        if: steps.resolved_plan.outputs.should_deploy == 'true' && steps.helm_deploy.outputs.enabled == 'true'
        uses: azure/setup-helm@v5

      - name: Load kubeconfig
        if: steps.resolved_plan.outputs.should_deploy == 'true' && steps.helm_deploy.outputs.enabled == 'true'
        shell: bash
        env:
          KUBECONFIG_B64: ${{ secrets.kubeconfig_b64 }}
        run: |
          set -euo pipefail
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "kubeconfig_b64 is required when Helm deployment is enabled." >&2
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Helm upgrade/install
        if: steps.resolved_plan.outputs.should_deploy == 'true' && steps.helm_deploy.outputs.enabled == 'true'
        shell: bash
        env:
          MULTI_PRODUCT: ${{ steps.resolved_plan.outputs.multi_product }}
          PRODUCTS_PLAN: ${{ steps.resolved_plan.outputs.products_plan }}
          HELM_SET_ARGS: ${{ steps.resolved_plan.outputs.helm_set_args }}
        run: |
          set -euo pipefail
          if [ "$MULTI_PRODUCT" = "true" ]; then
            while IFS= read -r product; do
              release="$(jq -r '.helm_release' <<< "$product")"
              chart="$(jq -r '.helm_chart' <<< "$product")"
              values="$(jq -r '.helm_values_file' <<< "$product")"
              namespace="$(jq -r '.kube_namespace' <<< "$product")"
              timeout="$(jq -r '.helm_timeout // "3m"' <<< "$product")"
              set_args="$(jq -r '.helm_set_args' <<< "$product")"
              echo "Helm upgrade $release in $namespace"
              helm upgrade --install \
                "$release" \
                "$chart" \
                -f "$values" \
                -n "$namespace" \
                --set-string "$set_args" \
                --rollback-on-failure \
                --wait \
                --timeout "$timeout" \
                --history-max 5
            done < <(jq -c '.[]' <<< "$PRODUCTS_PLAN")
          else
            helm upgrade --install \
              "${{ inputs.helm_release }}" \
              "${{ inputs.helm_chart }}" \
              -f "${{ inputs.helm_values_file }}" \
              -n "${{ inputs.kube_namespace }}" \
              --set-string "$HELM_SET_ARGS" \
              --rollback-on-failure \
              --wait \
              --timeout "${{ inputs.helm_timeout }}" \
              --history-max 5
          fi

      - name: Checkout GitOps repo
        if: steps.resolved_plan.outputs.should_deploy == 'true' && inputs.gitops_repository != ''
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.gitops_repository }}
          ref: ${{ inputs.gitops_branch }}
          token: ${{ secrets.gitops_token }}
          path: gitops
          fetch-depth: 1

      - name: Update GitOps application(s)
        if: steps.resolved_plan.outputs.should_deploy == 'true' && inputs.gitops_repository != ''
        id: update_gitops
        shell: bash
        env:
          MULTI_PRODUCT: ${{ steps.resolved_plan.outputs.multi_product }}
          PRODUCTS_PLAN: ${{ steps.resolved_plan.outputs.products_plan }}
          HELM_SET_ARGS: ${{ steps.resolved_plan.outputs.helm_set_args }}
          APPLICATION_FILE: ${{ inputs.gitops_application_file }}
          HELM_RELEASE: ${{ inputs.helm_release }}
          GITOPS_UPDATE_TARGET_REVISION_DEFAULT: ${{ inputs.gitops_update_target_revision }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path
          import json
          import os

          def apply_updates(path: Path, updates: dict, update_target_revision: bool, target_revision: str) -> None:
              if not path.exists():
                  raise SystemExit(f"{path} does not exist")
              lines = path.read_text().splitlines()
              current = None
              seen = set()
              for i, line in enumerate(lines):
                  stripped = line.strip()
                  if stripped.startswith("- name: "):
                      name = stripped.removeprefix("- name: ").strip().strip('"').strip("'")
                      current = name if name in updates else None
                  elif stripped.startswith("name: "):
                      name = stripped.removeprefix("name: ").strip().strip('"').strip("'")
                      current = name if name in updates else None
                  elif current and stripped.startswith("value:"):
                      indent = line[: len(line) - len(line.lstrip())]
                      lines[i] = f"{indent}value: {updates[current]}"
                      seen.add(current)
                      current = None

              missing = sorted(set(updates) - seen)
              if missing:
                  raise SystemExit(f"Missing Helm parameter(s) in {path}: {', '.join(missing)}")

              if update_target_revision:
                  if not target_revision:
                      raise SystemExit("gitops_update_target_revision is true but no target revision was resolved")
                  for i, line in enumerate(lines):
                      stripped = line.strip()
                      if stripped.startswith("targetRevision:"):
                          indent = line[: len(line) - len(line.lstrip())]
                          lines[i] = f"{indent}targetRevision: {json.dumps(target_revision)}"
                          break
                  else:
                      raise SystemExit(f"Missing targetRevision in {path}")

              path.write_text("\n".join(lines) + "\n")

          multi = os.environ.get("MULTI_PRODUCT") == "true"
          target_revision = os.environ.get("GITOPS_TARGET_REVISION", "").strip()
          changed_files = []
          release_names = []
          webhook_targets = []

          if multi:
              products = json.loads(os.environ.get("PRODUCTS_PLAN") or "[]")
              if not products:
                  raise SystemExit("No products planned for GitOps update")
              for product in products:
                  app_file = product.get("gitops_application_file") or ""
                  if not app_file:
                      raise SystemExit(f"Product {product.get('name')} missing gitops_application_file")
                  helm_set = product.get("helm_set_args") or ""
                  if not helm_set:
                      raise SystemExit(f"Product {product.get('name')} missing helm_set_args")
                  updates = {}
                  for item in helm_set.split(","):
                      if "=" not in item:
                          raise SystemExit(f"Invalid Helm set argument: {item}")
                      name, value = item.split("=", 1)
                      updates[name] = value
                  update_tr = product.get("gitops_update_target_revision")
                  if update_tr is None:
                      update_tr = os.environ.get("GITOPS_UPDATE_TARGET_REVISION_DEFAULT") == "true"
                  else:
                      update_tr = bool(update_tr)
                  path = Path("gitops") / app_file
                  apply_updates(path, updates, update_tr, target_revision)
                  changed_files.append(app_file)
                  release_names.append(product.get("helm_release") or product.get("name") or app_file)
                  webhook_target = product.get("gitops_webhook_target")
                  if webhook_target:
                      webhook_targets.append(webhook_target)
          else:
              app_file = os.environ.get("APPLICATION_FILE") or ""
              helm_set = os.environ.get("HELM_SET_ARGS") or ""
              if not app_file:
                  raise SystemExit("gitops_application_file is required when gitops_repository is set.")
              if not helm_set:
                  raise SystemExit("No Helm image tag parameters were planned.")
              updates = {}
              for item in helm_set.split(","):
                  if "=" not in item:
                      raise SystemExit(f"Invalid Helm set argument: {item}")
                  name, value = item.split("=", 1)
                  updates[name] = value
              update_tr = os.environ.get("GITOPS_UPDATE_TARGET_REVISION_DEFAULT") == "true"
              path = Path("gitops") / app_file
              apply_updates(path, updates, update_tr, target_revision)
              changed_files.append(app_file)
              release_names.append(os.environ.get("HELM_RELEASE") or app_file)

          Path("/tmp/gitops-files.txt").write_text("\n".join(changed_files) + "\n")
          Path("/tmp/gitops-releases.txt").write_text(", ".join(release_names))
          Path("/tmp/gitops-webhook-targets.txt").write_text("\n".join(dict.fromkeys(webhook_targets)) + "\n")
          print("Updated:", ", ".join(changed_files))
          PY

          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/gitops-files.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "releases=$(cat /tmp/gitops-releases.txt)" >> "$GITHUB_OUTPUT"
          echo "webhook_targets<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/gitops-webhook-targets.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Push GitOps update
        id: push_gitops_update
        if: steps.resolved_plan.outputs.should_deploy == 'true' && inputs.gitops_repository != ''
        working-directory: gitops
        shell: bash
        env:
          MULTI_PRODUCT: ${{ steps.resolved_plan.outputs.multi_product }}
          CHANGED_FILES: ${{ steps.update_gitops.outputs.files }}
          RELEASES: ${{ steps.update_gitops.outputs.releases }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No GitOps changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            git add "$f"
          done <<< "$CHANGED_FILES"
          if [ "$MULTI_PRODUCT" = "true" ]; then
            msg="Update GitOps deployments: $RELEASES"
          else
            msg="Update ${{ inputs.helm_release }} GitOps deployment"
          fi
          git commit -m "$msg"
          for attempt in 1 2 3 4 5; do
            git fetch origin "${{ inputs.gitops_branch }}"
            git rebase "origin/${{ inputs.gitops_branch }}"
            if git push origin HEAD:${{ inputs.gitops_branch }}; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "GitOps push attempt $attempt failed; retrying after rebase." >&2
            sleep $((attempt * 2))
          done
          echo "Failed to push GitOps update after retrying." >&2
          exit 1

      - name: Trigger Argo CD webhook
        if: steps.resolved_plan.outputs.should_deploy == 'true' && inputs.gitops_repository != '' && steps.push_gitops_update.outputs.changed == 'true'
        working-directory: gitops
        shell: bash
        env:
          GITOPS_WEBHOOK_SECRET: ${{ secrets.gitops_webhook_secret }}
          WEBHOOK_TARGETS: ${{ steps.update_gitops.outputs.webhook_targets }}
        run: |
          set -euo pipefail
          payload_file="$(mktemp)"
          signature_file="$(mktemp)"
          commit_sha="$(git rev-parse HEAD)"
          repo_url="https://github.com/${{ inputs.gitops_repository }}.git"

          jq -cn \
            --arg ref "refs/heads/$GITOPS_BRANCH" \
            --arg before "" \
            --arg after "$commit_sha" \
            --arg clone_url "$repo_url" \
            --arg html_url "https://github.com/${{ inputs.gitops_repository }}" \
            '{ref:$ref,before:$before,after:$after,repository:{clone_url:$clone_url,html_url:$html_url,url:$html_url}}' \
            > "$payload_file"

          headers=(
            -H "Content-Type: application/json"
            -H "X-GitHub-Event: push"
            -H "X-GitHub-Delivery: $GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          )

          if [ -n "$GITOPS_WEBHOOK_SECRET" ]; then
            python3 - "$GITOPS_WEBHOOK_SECRET" "$payload_file" "$signature_file" <<'PY'
          import hmac
          import hashlib
          import sys
          from pathlib import Path

          secret = sys.argv[1].encode()
          payload = Path(sys.argv[2]).read_bytes()
          signature = hmac.new(secret, payload, hashlib.sha256).hexdigest()
          Path(sys.argv[3]).write_text(f"sha256={signature}")
          PY
            headers+=(-H "X-Hub-Signature-256: $(cat "$signature_file")")
          fi

          webhook_urls=()
          if [ "$GITOPS_WEBHOOK_URLS_JSON" != "" ] && [ "$GITOPS_WEBHOOK_URLS_JSON" != "{}" ]; then
            jq -e 'type == "object"' <<< "$GITOPS_WEBHOOK_URLS_JSON" >/dev/null
            while IFS= read -r target; do
              [ -z "$target" ] && continue
              url="$(jq -r --arg target "$target" '.[$target] // empty' <<< "$GITOPS_WEBHOOK_URLS_JSON")"
              if [ -z "$url" ]; then
                echo "No Argo CD webhook URL is configured for target: $target" >&2
                exit 1
              fi
              webhook_urls+=("$url")
            done <<< "$WEBHOOK_TARGETS"
          fi

          if [ "${#webhook_urls[@]}" -eq 0 ] && [ -n "$GITOPS_WEBHOOK_URL" ]; then
            webhook_urls+=("$GITOPS_WEBHOOK_URL")
          fi
          if [ "${#webhook_urls[@]}" -eq 0 ]; then
            echo "No Argo CD webhook target is configured; skipping trigger."
            exit 0
          fi

          while IFS= read -r webhook_url; do
            [ -z "$webhook_url" ] && continue
            webhook_url="${webhook_url%/}/api/webhook"
            echo "Triggering Argo CD webhook: $webhook_url"
            curl -fsSL -X POST "${headers[@]}" --data-binary "@$payload_file" "$webhook_url"
          done < <(printf '%s\n' "${webhook_urls[@]}" | sort -u)
