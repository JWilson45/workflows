name: Test GHCR Cleanup

on:
  pull_request:
    paths:
      - ".github/scripts/ghcr-cleanup/**"
      - ".github/workflows/cleanup-pr-images.yaml"
      - ".github/workflows/cleanup-pr-images-weekly.yaml"
      - ".github/workflows/test-cleanup.yaml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --test .github/scripts/ghcr-cleanup/*.test.js
      - name: Parse cleanup workflows
        run: ruby -e 'require "yaml"; ARGV.each { |path| YAML.load_file(path) }' .github/workflows/cleanup-pr-images.yaml .github/workflows/cleanup-pr-images-weekly.yaml
